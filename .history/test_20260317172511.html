<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            display: flex;
            flex-direction: row;
        }

        .container > div {
            width: 100px;
            height: 100px;
            background-color: rgba(221, 230, 145, 0.5);
            margin: 10px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 40px;
            
        }   

    </style>
</head>
<body>
    <div class="container">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
    </div>
    

    
</body>
</html>
