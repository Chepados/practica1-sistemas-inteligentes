<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            display: flex;
            flex-direction: row;
            margin: 30px;
        }

        .container > div {
            width: 100px;
            height: 100px;
            background-color: rgba(218, 226, 149, 0.5);
            margin: 10px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 40px;
            font-weight: bold;

            border-radius: 10px;
            border: 2px solid black;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }   

        .selected {
            background-color: rgba(255, 0, 0, 0.5) !important;
            transform: translateY(-10px);
        }

    </style>
</head>
<body>
    <div class="container">
        <div>A</div>
        <div class="selected">B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
    </div>

    <div class="container">
        <div>A</div>
        <div>C</div>
        <div>D</div>
        <div class="selected">B</div>
        <div>E</div>
    </div>
    

    
</body>
</html>
